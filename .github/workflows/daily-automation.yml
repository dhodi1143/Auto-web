name: Daily Tech Content Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai>=0.5.4 python-dotenv requests

      - name: Run Market Research
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # This command finds the file and runs it even if it is in a folder
          FILE_PATH=$(find . -name "market_research.py" -print -quit)
          if [ -f "$FILE_PATH" ]; then
            python "$FILE_PATH"
          else
            echo "ERROR: market_research.py not found in the repository!"
            ls -R
            exit 1
          fi
          
